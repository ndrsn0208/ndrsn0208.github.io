# papers.toml — your publication list (edit by hand).
#
# Add an entry per paper. After editing, run:
#
#   python scripts/update_publications.py
#
# The script will:
#   • fetch title / authors / abstract from arxiv,
#   • cache the HTML version under public/arxiv-cache/,
#   • summarize via the local Claude Code CLI (no API key needed),
#   • generate the per-paper foil gradient,
#   • write src/data/publications.json.
#
# Once you commit publications.json, the deployed site runs zero AI calls
# in production — everything is baked in at update time.
#
# ── Schema ─────────────────────────────────────────────────────────────
#   arxiv  (required) — arxiv id; bare ("2401.12345"), URL, or with `vN`
#   venue  (optional) — e.g. "ICML 2026", "NeurIPS 2025". Defaults to
#                       "arXiv {YYYY}" inferred from the arxiv id.
#   award  (optional) — "spotlight", "oral", "best paper", etc. Renders
#                       as a small badge on the card and detail page.
# ───────────────────────────────────────────────────────────────────────

